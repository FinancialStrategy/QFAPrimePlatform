services:
  - type: web
    name: qfa-prime-finance-platform
    env: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: QFA_OUTPUT_DIR
        value: /tmp/qfa_output
